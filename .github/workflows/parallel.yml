name: Parallel CI/CD
on:
  push:
    branches:
      - main
jobs:
  ssh:
    name: SSH Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

        with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "SSH connection established">>ssh.txt
          echo "Deploying application..."
          # Add your deployment commands here
          echo whoami
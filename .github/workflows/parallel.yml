name: Parallel CI/CD

on:
  push:
    branches:
      - main


jobs:

  frontend:
    name: Frontend Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Frontend Build
      run: |
        echo "Frontend build running"
        echo "React/Vue/HTML files deployed"


  backend:
    name: Backend Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Backend Build
      run: |
        echo "Backend testing"
        echo "Backend deployed"


  database:
    name: Database Update
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Database Migration
      run: |
        echo "Database migration running"
        echo "Database updated"


